project:
  type: website
  execute-dir: project
  output-dir: docs
  render:
    - "*.qmd"

execute: 
  freeze: auto

website:
  title: "Central Valley Chinook Salmon Synthesis"
  repo-url: https://github.com/TracyGrimes/CV-Chinook-synthesis
  repo-actions: [issue]
  navbar:
    background: primary
    left:
      - text: "Home"
        href: index.qmd
    right: 
      - icon: github
        href: https://github.com/TracyGrimes/CV-Chinook-synthesis
  page-footer: 
    center: "Copyright &copy; 2026, Tracy Grimes"
    background: secondary

format:
  html:
    toc: true
    link-external-newwindow: true
    link-external-icon: false
